<style>
  :root{
    --bg:#ffffff;
    --ink:#514a52;
    --ink-soft:#9a9098;
    --accent:#ff9fb2;
    --accent-deep:#f4728e;
    --mint:#bfe6d8;
    --cream:#fff6f8;
    --line:#f0e7ea;
    --shadow:0 8px 24px rgba(244,114,142,.10);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Noto Sans KR",sans-serif; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px; margin:0 auto; padding:0 20px 80px}
  h1,h2,.jua{font-family:"Jua",sans-serif; font-weight:400; letter-spacing:.2px}

  /* ---- profile ---- */
  .profile{text-align:center; padding:56px 0 24px}
  .avatar{
    width:120px; height:120px; border-radius:50%; margin:0 auto 18px;
    background:var(--cream); border:4px solid #fff; box-shadow:var(--shadow);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    color:var(--accent); font-size:36px;
  }
  .avatar img{width:100%; height:100%; object-fit:cover; display:block}
  .profile h1{font-size:34px; margin:0 0 6px; color:var(--ink)}
  .profile h1 .heart{color:var(--accent); font-size:24px; vertical-align:middle}
  .tagline{color:var(--ink-soft); margin:0 0 18px; font-size:15px}
  .links{display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
  .links a{
    text-decoration:none; color:var(--accent-deep); background:var(--cream);
    padding:7px 16px; border-radius:999px; font-size:13px; font-weight:500;
    border:1px solid var(--line); transition:.15s;
  }
  .links a:hover{background:var(--accent); color:#fff; transform:translateY(-2px)}

  /* ---- tabs ---- */
  .tabs{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:8px 0 30px}
  .tab{
    font-family:"Jua",sans-serif; font-size:15px; cursor:pointer;
    padding:9px 20px; border-radius:999px; border:1px solid var(--line);
    background:#fff; color:var(--ink-soft); transition:.15s; position:relative;
  }
  .tab:hover{color:var(--accent-deep); border-color:var(--accent)}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:var(--shadow)}
  .tab .x{margin-left:8px; opacity:.7; font-weight:700}
  .tab .x:hover{opacity:1}
  .tab.add{color:var(--accent-deep); border-style:dashed}

  /* ---- category body ---- */
  .cat-desc{
    background:var(--cream); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 22px; margin:0 0 22px; color:var(--ink); font-size:15px; white-space:pre-wrap;
  }
  .cat-link{display:inline-block; margin:0 0 24px; text-decoration:none}
  .cat-link a, .cat-link{
    color:var(--accent-deep); font-weight:500; font-size:14px;
  }
  .cat-link a{background:#fff; border:1px solid var(--accent); padding:8px 18px; border-radius:999px; text-decoration:none; transition:.15s}
  .cat-link a:hover{background:var(--accent); color:#fff}

  /* ---- album grid ---- */
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
  .thumb{
    aspect-ratio:1/1; border-radius:16px; overflow:hidden; background:var(--cream);
    box-shadow:var(--shadow); position:relative; transition:.18s; border:1px solid var(--line);
  }
  .thumb:hover{transform:translateY(-4px)}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .thumb .ph{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    color:var(--accent); font-family:"Jua"; font-size:14px;
    background:linear-gradient(135deg,var(--cream),#fff);
  }
  .thumb .cap{
    position:absolute; left:0; right:0; bottom:0; padding:8px 10px; font-size:12px;
    color:#fff; background:linear-gradient(transparent,rgba(81,74,82,.55));
  }
  .thumb .del{
    position:absolute; top:6px; right:6px; width:24px; height:24px; border-radius:50%;
    background:#fff; color:var(--accent-deep); border:none; cursor:pointer; font-weight:700;
    box-shadow:var(--shadow); display:none;
  }
  body.editing .thumb .del{display:block}

  .empty{
    grid-column:1/-1; text-align:center; padding:50px 0; color:var(--ink-soft);
    font-family:"Jua"; font-size:15px;
  }

  /* ---- pagination ---- */
  .pager{display:flex; gap:8px; justify-content:center; align-items:center; margin:28px 0 0}
  .pager button{
    font-family:"Jua"; min-width:36px; height:36px; border-radius:12px; border:1px solid var(--line);
    background:#fff; color:var(--ink-soft); cursor:pointer; transition:.15s; padding:0 10px;
  }
  .pager button:hover:not(:disabled){border-color:var(--accent); color:var(--accent-deep)}
  .pager button.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .pager button:disabled{opacity:.4; cursor:default}

  /* ---- edit controls ---- */
  .editbar{
    position:sticky; top:0; z-index:20; background:#fff; border-bottom:1px solid var(--line);
    display:flex; gap:10px; align-items:center; justify-content:flex-end; padding:12px 20px;
  }
  .editbar .note{margin-right:auto; color:var(--ink-soft); font-size:12px}
  .btn{
    font-family:"Jua"; cursor:pointer; border-radius:999px; padding:9px 18px; font-size:14px;
    border:1px solid var(--accent); background:#fff; color:var(--accent-deep); transition:.15s;
  }
  .btn:hover{background:var(--cream)}
  .btn.solid{background:var(--accent); color:#fff}
  .btn.solid:hover{background:var(--accent-deep)}
  .btn.ghost{border-color:var(--line); color:var(--ink-soft)}

  .field{display:block; margin:0 0 10px}
  .field label{display:block; font-size:12px; color:var(--ink-soft); margin:0 0 4px; font-weight:500}
  input.inp, textarea.inp{
    width:100%; font-family:inherit; font-size:14px; color:var(--ink);
    border:1px solid var(--line); border-radius:12px; padding:9px 12px; background:#fff;
  }
  input.inp:focus, textarea.inp:focus{outline:none; border-color:var(--accent)}
  textarea.inp{resize:vertical; min-height:80px; line-height:1.6}

  .editcard{
    background:var(--cream); border:1px dashed var(--accent); border-radius:var(--radius);
    padding:18px 20px; margin:0 0 22px;
  }
  .editcard h3{font-family:"Jua"; font-size:15px; margin:0 0 12px; color:var(--accent-deep)}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .row .field{flex:1; min-width:140px}
  .linkrow{display:flex; gap:8px; margin:0 0 8px; align-items:center}
  .linkrow input{flex:1}
  .mini{background:none; border:none; color:var(--accent-deep); cursor:pointer; font-size:18px; line-height:1; font-weight:700}

  .help{background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px 18px; margin:0 0 22px; font-size:13px; color:var(--ink-soft)}
  .help b{color:var(--ink)}
  .help ol{margin:8px 0 0; padding-left:18px} .help li{margin:3px 0}

  /* ---- lightbox ---- */
  .lb{position:fixed; inset:0; z-index:100; background:rgba(81,74,82,.86); display:flex; align-items:center; justify-content:center; padding:30px}
  .lb[hidden]{display:none}
  .lb-inner{max-width:90vw; max-height:88vh; text-align:center}
  .lb-inner img{max-width:90vw; max-height:80vh; border-radius:14px; box-shadow:0 20px 50px rgba(0,0,0,.4); display:block; margin:0 auto}
  .lb-ph{width:60vw; max-width:420px; height:60vh; max-height:420px; background:var(--cream); border-radius:14px; display:flex; align-items:center; justify-content:center; color:var(--accent); font-family:"Jua"}
  .lb-cap{color:#fff; margin-top:14px; font-family:"Jua"; font-size:15px}
  .lb-close{position:absolute; top:18px; right:22px; width:42px; height:42px; border-radius:50%; border:none; background:rgba(255,255,255,.9); color:var(--accent-deep); font-size:22px; cursor:pointer; line-height:1}
  .lb-prev,.lb-next{position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%; border:none; background:rgba(255,255,255,.85); color:var(--accent-deep); font-size:26px; font-family:"Jua"; cursor:pointer; line-height:1}
  .lb-prev{left:18px} .lb-next{right:18px}
  .lb-close:hover,.lb-prev:hover,.lb-next:hover{background:#fff}

  footer{text-align:center; color:var(--ink-soft); font-size:12px; padding:40px 0 0}

  @media(max-width:640px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .profile{padding-top:40px}
    .profile h1{font-size:28px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<script>
(function(){
  "use strict";
  var PER_PAGE = 9;
  var data = JSON.parse(document.getElementById('portfolio-data').textContent);
  var state = { active: 0, page: {}, editing: false };
  var app = document.getElementById('app');
  var editbar = document.getElementById('editbar');
  var canEdit = new URLSearchParams(location.search).has('edit');
  var lbIndex = 0;

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function pageOf(i){ return state.page[i] || 0; }

  /* ---------- render ---------- */
  function render(){
    document.body.classList.toggle('editing', state.editing);
    renderEditbar();
    var html = renderProfile() + renderTabs();
    if(state.editing) html += renderHelp();
    html += renderCategory();
    app.innerHTML = html;
    bind();
  }

  function renderEditbar(){
    if(!canEdit){ editbar.innerHTML=''; return; }
    editbar.innerHTML =
      '<div class="editbar">' +
        (state.editing
          ? '<span class="note">편집한 내용은 임시예요. <b>사이트 저장하기</b>로 새 파일을 받아 깃허브에 올려야 반영됩니다.</span>' +
            '<button class="btn solid" id="save">사이트 저장하기</button>' +
            '<button class="btn ghost" id="toggle">미리보기</button>'
          : '<button class="btn" id="toggle">편집</button>') +
      '</div>';
  }

  function renderProfile(){
    var p = data.profile;
    if(state.editing){
      var links = p.links.map(function(l,i){
        return '<div class="linkrow">'+
          '<input class="inp" data-pl="label" data-i="'+i+'" value="'+esc(l.label)+'" placeholder="이름 (예: Twitter)">'+
          '<input class="inp" data-pl="url" data-i="'+i+'" value="'+esc(l.url)+'" placeholder="https://">'+
          '<button class="mini" data-plremove="'+i+'" title="삭제">×</button></div>';
      }).join('');
      return '<div class="editcard"><h3>프로필</h3>'+
        '<div class="field"><label>작가명</label><input class="inp" id="p-name" value="'+esc(p.name)+'"></div>'+
        '<div class="field"><label>한 줄 소개</label><input class="inp" id="p-tag" value="'+esc(p.tagline)+'"></div>'+
        '<div class="field"><label>프로필 이미지 (파일명 또는 URL)</label><input class="inp" id="p-avatar" value="'+esc(p.avatar)+'" placeholder="profile.png"></div>'+
        '<div class="field"><label>링크</label>'+links+
        '<button class="btn ghost" id="p-addlink">+ 링크 추가</button></div></div>';
    }
    var avatar = p.avatar && p.avatar.trim()
      ? '<img src="'+esc(p.avatar)+'" alt="">'
      : '♡';
    var links = p.links.filter(function(l){return l.url && l.url.trim();}).map(function(l){
      return '<a href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.label)+'</a>'; }).join('');
    return '<div class="profile"><div class="avatar">'+avatar+'</div>'+
      '<h1>'+esc(p.name)+' <span class="heart">♡</span></h1>'+
      '<p class="tagline">'+esc(p.tagline)+'</p>'+
      '<div class="links">'+links+'</div></div>';
  }

  function renderTabs(){
    var tabs = data.categories.map(function(c,i){
      var x = state.editing ? '<span class="x" data-remove="'+i+'" title="카테고리 삭제">×</span>' : '';
      return '<div class="tab'+(i===state.active?' active':'')+'" data-tab="'+i+'">'+esc(c.name)+x+'</div>';
    }).join('');
    if(state.editing) tabs += '<div class="tab add" id="addcat">+ 카테고리</div>';
    return '<div class="tabs">'+tabs+'</div>';
  }

  function renderHelp(){
    return '<div class="help"><b>사용법</b>'+
      '<ol>'+
      '<li>여기서 프로필·카테고리·글·그림을 자유롭게 고쳐요.</li>'+
      '<li>그림은 이미지 <b>파일명</b>(깃허브에 같이 올린 파일)이나 <b>이미지 주소(URL)</b>를 넣으면 돼요.</li>'+
      '<li>다 됐으면 위 <b>사이트 저장하기</b>를 눌러 새 index.html을 받아, 깃허브 저장소에 덮어 올리면 반영돼요.</li>'+
      '</ol></div>';
  }

  function renderCategory(){
    var c = data.categories[state.active];
    if(!c) return '<div class="empty">카테고리를 추가해 주세요.</div>';

    var out = '';
    if(state.editing){
      out += '<div class="editcard"><h3>카테고리 설정</h3>'+
        '<div class="row">'+
          '<div class="field"><label>카테고리 이름</label><input class="inp" id="c-name" value="'+esc(c.name)+'"></div>'+
          '<div class="field"><label>연결 링크 (선택)</label><input class="inp" id="c-link" value="'+esc(c.link)+'" placeholder="https://"></div>'+
        '</div>'+
        '<div class="field"><label>소개 글</label><textarea class="inp" id="c-text" placeholder="이 카테고리에 대한 설명을 적어보세요.">'+esc(c.text)+'</textarea></div>'+
        '<div class="field"><label>그림 추가</label><div class="row">'+
          '<input class="inp" id="img-src" placeholder="이미지 파일명 또는 URL">'+
          '<input class="inp" id="img-cap" placeholder="설명 (선택)" style="max-width:180px">'+
          '<button class="btn" id="img-add">추가</button></div></div>'+
        '</div>';
    } else {
      if(c.text && c.text.trim()) out += '<div class="cat-desc">'+esc(c.text)+'</div>';
      if(c.link && c.link.trim()) out += '<div class="cat-link"><a href="'+esc(c.link)+'" target="_blank" rel="noopener">바로가기 →</a></div>';
    }

    out += renderGrid(c);
    return out;
  }

  function renderGrid(c){
    var imgs = c.images || [];
    if(imgs.length === 0) return '<div class="grid"><div class="empty"></div></div>';
    var pages = Math.ceil(imgs.length / PER_PAGE);
    var pg = Math.min(pageOf(state.active), pages-1);
    if(pg < 0) pg = 0;
    var slice = imgs.slice(pg*PER_PAGE, pg*PER_PAGE + PER_PAGE);
    var cells = slice.map(function(im, k){
      var idx = pg*PER_PAGE + k;
      var body = (im.src && im.src.trim())
        ? '<img src="'+esc(im.src)+'" alt="'+esc(im.caption||'')+'" data-img>'
        : '<div class="ph">이미지</div>';
      var cap = (im.caption && im.caption.trim() && !state.editing) ? '<div class="cap">'+esc(im.caption)+'</div>' : '';
      var del = state.editing ? '<button class="del" data-delimg="'+idx+'" title="삭제">×</button>' : '';
      return '<div class="thumb" data-open="'+idx+'">'+body+cap+del+'</div>';
    }).join('');
    var grid = '<div class="grid">'+cells+'</div>';
    var pager = '';
    if(pages > 1){
      var btns = '';
      for(var i=0;i<pages;i++){ btns += '<button class="'+(i===pg?'on':'')+'" data-page="'+i+'">'+(i+1)+'</button>'; }
      pager = '<div class="pager">'+
        '<button data-page="'+(pg-1)+'" '+(pg===0?'disabled':'')+'>‹</button>'+
        btns+
        '<button data-page="'+(pg+1)+'" '+(pg===pages-1?'disabled':'')+'>›</button></div>';
    }
    return grid + pager;
  }

  /* ---------- bind events ---------- */
  function bind(){
    var t = document.getElementById('toggle');
    if(t) t.onclick = function(){ state.editing = !state.editing; render(); };
    var s = document.getElementById('save');
    if(s) s.onclick = exportSite;

    // tabs
    app.querySelectorAll('[data-tab]').forEach(function(el){
      el.addEventListener('click', function(e){
        if(e.target.hasAttribute('data-remove')) return;
        state.active = +el.getAttribute('data-tab'); render();
      });
    });
    app.querySelectorAll('[data-remove]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        var i = +el.getAttribute('data-remove');
        if(data.categories.length<=1){ alert('카테고리는 최소 1개는 있어야 해요.'); return; }
        if(!confirm('"'+data.categories[i].name+'" 카테고리를 삭제할까요?')) return;
        data.categories.splice(i,1);
        if(state.active>=data.categories.length) state.active=data.categories.length-1;
        render();
      });
    });
    var addc = document.getElementById('addcat');
    if(addc) addc.onclick = function(){
      data.categories.push({name:'새 카테고리', link:'', text:'', images:[]});
      state.active = data.categories.length-1; render();
    };

    // pagination
    app.querySelectorAll('[data-page]').forEach(function(el){
      el.addEventListener('click', function(){
        state.page[state.active] = +el.getAttribute('data-page'); render();
      });
    });

    if(!state.editing){
      app.querySelectorAll('[data-open]').forEach(function(el){
        el.style.cursor='zoom-in';
        el.addEventListener('click', function(){ openLightbox(+el.getAttribute('data-open')); });
      });
      return;
    }

    // profile edits
    bindInput('p-name', function(v){ data.profile.name=v; });
    bindInput('p-tag', function(v){ data.profile.tagline=v; });
    bindInput('p-avatar', function(v){ data.profile.avatar=v; });
    app.querySelectorAll('[data-pl]').forEach(function(el){
      el.addEventListener('input', function(){
        var i=+el.getAttribute('data-i'), key=el.getAttribute('data-pl');
        data.profile.links[i][key]=el.value;
      });
    });
    app.querySelectorAll('[data-plremove]').forEach(function(el){
      el.addEventListener('click', function(){
        data.profile.links.splice(+el.getAttribute('data-plremove'),1); render();
      });
    });
    var al = document.getElementById('p-addlink');
    if(al) al.onclick = function(){ data.profile.links.push({label:'',url:''}); render(); };

    // category edits
    var c = data.categories[state.active];
    bindInput('c-name', function(v){ c.name=v; document.querySelector('.tab.active') && (document.querySelector('.tab.active').childNodes[0].nodeValue=v); });
    bindInput('c-link', function(v){ c.link=v; });
    bindInput('c-text', function(v){ c.text=v; });
    var addImg = document.getElementById('img-add');
    if(addImg) addImg.onclick = function(){
      var src = document.getElementById('img-src').value.trim();
      var cap = document.getElementById('img-cap').value.trim();
      if(!src){ document.getElementById('img-src').focus(); return; }
      c.images.push({src:src, caption:cap});
      state.page[state.active] = Math.ceil(c.images.length/PER_PAGE)-1;
      render();
    };
    app.querySelectorAll('[data-delimg]').forEach(function(el){
      el.addEventListener('click', function(){
        c.images.splice(+el.getAttribute('data-delimg'),1); render();
      });
    });
  }

  function bindInput(id, fn){
    var el = document.getElementById(id);
    if(el) el.addEventListener('input', function(){ fn(el.value); });
  }

  /* ---------- lightbox ---------- */
  function openLightbox(i){
    var imgs = data.categories[state.active].images;
    if(!imgs || !imgs.length) return;
    lbIndex = i; showLightbox();
  }
  function showLightbox(){
    var imgs = data.categories[state.active].images;
    var im = imgs[lbIndex]; if(!im) return;
    var box = document.getElementById('lightbox');
    var content = (im.src && im.src.trim())
      ? '<img src="'+esc(im.src)+'" alt="'+esc(im.caption||'')+'">'
      : '<div class="lb-ph">이미지</div>';
    var cap = (im.caption && im.caption.trim()) ? '<div class="lb-cap">'+esc(im.caption)+'</div>' : '';
    var nav = imgs.length>1 ? '<button class="lb-prev" aria-label="이전">‹</button><button class="lb-next" aria-label="다음">›</button>' : '';
    box.innerHTML = '<button class="lb-close" aria-label="닫기">×</button>'+nav+'<div class="lb-inner">'+content+cap+'</div>';
    box.hidden = false; document.body.style.overflow='hidden';
    box.querySelector('.lb-close').onclick = closeLightbox;
    var p=box.querySelector('.lb-prev'), n=box.querySelector('.lb-next');
    if(p) p.onclick=function(e){ e.stopPropagation(); lbIndex=(lbIndex-1+imgs.length)%imgs.length; showLightbox(); };
    if(n) n.onclick=function(e){ e.stopPropagation(); lbIndex=(lbIndex+1)%imgs.length; showLightbox(); };
    box.onclick=function(e){ if(e.target===box) closeLightbox(); };
  }
  function closeLightbox(){
    var box=document.getElementById('lightbox'); box.hidden=true; box.innerHTML=''; document.body.style.overflow='';
  }
  document.addEventListener('keydown', function(e){
    var box=document.getElementById('lightbox'); if(box.hidden) return;
    if(e.key==='Escape') closeLightbox();
    else if(e.key==='ArrowLeft'){ var b=box.querySelector('.lb-prev'); if(b) b.click(); }
    else if(e.key==='ArrowRight'){ var b=box.querySelector('.lb-next'); if(b) b.click(); }
  });

  /* ---------- export ---------- */
  function exportSite(){
    document.getElementById('portfolio-data').textContent = JSON.stringify(data, null, 2);
    var clone = document.documentElement.cloneNode(true);
    var eb = clone.querySelector('#editbar'); if(eb) eb.innerHTML='';
    var ap = clone.querySelector('#app'); if(ap) ap.innerHTML='';
    var lb = clone.querySelector('#lightbox'); if(lb){ lb.innerHTML=''; lb.hidden=true; }
    clone.classList.remove('editing');
    var html = '<!DOCTYPE html>\n' + clone.outerHTML;
    var blob = new Blob([html], {type:'text/html'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'index.html';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    alert('index.html을 받았어요! 이 파일을 깃허브 저장소에 덮어 올리면 사이트에 반영됩니다.');
  }

  document.getElementById('fy').textContent = new Date().getFullYear();
  render();
})();
</script>
